AWSTemplateFormatVersion: '2010-09-09'
Description: 'EZ Car Rental Basic Infrastructure'

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, production]
    Description: Environment name

Resources:
  # S3 Buckets
  StaticAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ezcarrental-${Environment}-static-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ImageUploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ezcarrental-${Environment}-images-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:
  StaticAssetsBucket:
    Description: S3 bucket for static assets
    Value: !Ref StaticAssetsBucket
    Export:
      Name: !Sub 'EZCarRental-${Environment}-StaticBucket'

  ImageUploadsBucket:
    Description: S3 bucket for image uploads
    Value: !Ref ImageUploadsBucket
    Export:
      Name: !Sub 'EZCarRental-${Environment}-ImagesBucket'