name: AI Car Rental CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # ──────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────

  test-rental:
    name: Test Rental App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rental-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rental-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run infrastructure Lambda unit tests
        working-directory: rental-app/infrastructure
        run: |
          npm ci
          npx jest --config jest.config.js --ci --coverage

      # Temporarily disabled linting due to TypeScript ESLint config issues
      # - name: Run linting
      #   run: npm run lint

      # Frontend Jest (jsdom) still blocked on config; see infrastructure tests above
      # - name: Run tests
      #   run: npm test

  test-tunnel:
    name: Test Tunnel Lambdas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: camera-system
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          pip install -r lambdas/review_api/requirements.txt 2>/dev/null || true
          pip install -r lambdas/damage_detection/requirements.txt 2>/dev/null || true
          pip install pytest boto3 moto

      - name: Run tunnel Lambda tests
        run: |
          python -m pytest lambdas/review_api/tests/ -q --tb=short
          python -m pytest lambdas/damage_detection/tests/ -q --tb=short

  # ──────────────────────────────────────────
  # DEV deployment (develop branch)
  # ──────────────────────────────────────────

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [test-rental, test-tunnel]
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rental-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set CDK environment variables
        run: |
          echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV
          echo "CDK_DEFAULT_REGION=${{ env.AWS_REGION }}" >> $GITHUB_ENV

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Bootstrap CDK (if needed)
        run: |
          if aws ssm get-parameter --name "/cdk-bootstrap/hnb659fds/version" --region $CDK_DEFAULT_REGION >/dev/null 2>&1; then
            echo "CDK already bootstrapped"
          else
            cdk bootstrap aws://$CDK_DEFAULT_ACCOUNT/$CDK_DEFAULT_REGION
          fi

      # ── Tunnel CDK deploy ──
      - name: Install tunnel CDK dependencies
        run: pip install aws-cdk-lib constructs
        working-directory: camera-system/infra

      - name: Deploy tunnel infrastructure
        working-directory: camera-system/infra
        run: cdk deploy --all --context environment=dev --require-approval never

      # ── Rental CDK deploy ──
      - name: Cache rental build output
        uses: actions/cache@v4
        id: build-cache
        with:
          path: rental-app/dist/
          key: build-${{ hashFiles('rental-app/src/**/*', 'rental-app/package.json', 'rental-app/package-lock.json', 'rental-app/vite.config.ts', 'rental-app/tsconfig.json') }}

      - name: Build rental app (if cache miss)
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: rental-app
        run: |
          npm ci
          npm run build

      - name: Prepare rental Lambda dependencies
        working-directory: rental-app
        run: |
          cd infrastructure/lambda-layers/common/nodejs
          npm ci --production
          cd ../../../../
          mkdir -p infrastructure/lambda/api

      - name: Install rental CDK dependencies
        working-directory: rental-app
        run: npm ci

      - name: Clean up stuck rental stacks
        working-directory: rental-app
        run: |
          STACK_NAME="EzCarRental-dev"
          STACK_STATUS=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [[ "$STACK_STATUS" == "ROLLBACK_COMPLETE" || "$STACK_STATUS" == "CREATE_FAILED" || "$STACK_STATUS" == "UPDATE_ROLLBACK_COMPLETE" ]]; then
            aws cloudformation delete-stack --stack-name $STACK_NAME
            aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME || true
          fi

      - name: Deploy rental infrastructure
        working-directory: rental-app/infrastructure
        run: cdk deploy --context environment=dev --require-approval never

      - name: Read outputs from SSM
        id: ssm
        run: |
          STATIC_BUCKET=$(aws ssm get-parameter --name /acr/dev/rental/static-bucket --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-dev --query 'Stacks[0].Outputs[?OutputKey==`StaticAssetsBucketName`].OutputValue' --output text)
          API_ENDPOINT=$(aws ssm get-parameter --name /acr/dev/rental/api-endpoint --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-dev --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' --output text)
          echo "static_bucket=$STATIC_BUCKET" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        working-directory: rental-app
        run: aws s3 sync dist/ s3://${{ steps.ssm.outputs.static_bucket }}/ --delete

      - name: Dev health check
        run: |
          curl -sf ${{ steps.ssm.outputs.api_endpoint }} || echo "API health check returned non-200 (may be expected)"

  # ──────────────────────────────────────────
  # STAGING deployment (main branch)
  # ──────────────────────────────────────────

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-rental, test-tunnel]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rental-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set CDK environment variables
        run: |
          echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV
          echo "CDK_DEFAULT_REGION=${{ env.AWS_REGION }}" >> $GITHUB_ENV

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Bootstrap CDK (if needed)
        run: |
          if aws ssm get-parameter --name "/cdk-bootstrap/hnb659fds/version" --region $CDK_DEFAULT_REGION >/dev/null 2>&1; then
            echo "CDK already bootstrapped"
          else
            cdk bootstrap aws://$CDK_DEFAULT_ACCOUNT/$CDK_DEFAULT_REGION
          fi

      # ── Tunnel CDK deploy ──
      - name: Install tunnel CDK dependencies
        run: pip install aws-cdk-lib constructs
        working-directory: camera-system/infra

      - name: Deploy tunnel infrastructure
        working-directory: camera-system/infra
        run: cdk deploy --all --context environment=staging --require-approval never

      # ── Rental CDK deploy ──
      - name: Cache rental build output
        uses: actions/cache@v4
        id: build-cache
        with:
          path: rental-app/dist/
          key: build-${{ hashFiles('rental-app/src/**/*', 'rental-app/package.json', 'rental-app/package-lock.json', 'rental-app/vite.config.ts', 'rental-app/tsconfig.json') }}

      - name: Build rental app (if cache miss)
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: rental-app
        run: |
          npm ci
          npm run build

      - name: Prepare rental Lambda dependencies
        working-directory: rental-app
        run: |
          cd infrastructure/lambda-layers/common/nodejs
          npm ci --production
          cd ../../../../
          mkdir -p infrastructure/lambda/api

      - name: Install rental CDK dependencies
        working-directory: rental-app
        run: npm ci

      - name: Clean up stuck rental stacks
        working-directory: rental-app
        run: |
          STACK_NAME="EzCarRental-staging"
          STACK_STATUS=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [[ "$STACK_STATUS" == "ROLLBACK_COMPLETE" || "$STACK_STATUS" == "CREATE_FAILED" || "$STACK_STATUS" == "UPDATE_ROLLBACK_COMPLETE" ]]; then
            aws cloudformation delete-stack --stack-name $STACK_NAME
            aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME || true
          fi

      - name: Deploy rental infrastructure
        working-directory: rental-app/infrastructure
        run: cdk deploy --context environment=staging --require-approval never

      - name: Read outputs from SSM
        id: ssm
        run: |
          STATIC_BUCKET=$(aws ssm get-parameter --name /acr/staging/rental/static-bucket --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-staging --query 'Stacks[0].Outputs[?OutputKey==`StaticAssetsBucketName`].OutputValue' --output text)
          API_ENDPOINT=$(aws ssm get-parameter --name /acr/staging/rental/api-endpoint --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-staging --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' --output text)
          echo "static_bucket=$STATIC_BUCKET" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        working-directory: rental-app
        run: aws s3 sync dist/ s3://${{ steps.ssm.outputs.static_bucket }}/ --delete

      - name: Staging smoke tests
        run: |
          curl -sf ${{ steps.ssm.outputs.api_endpoint }} || exit 1
          curl -sf ${{ steps.ssm.outputs.api_endpoint }}/cars || exit 1

  # ──────────────────────────────────────────
  # PRODUCTION deployment (main, after staging)
  # ──────────────────────────────────────────

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rental-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set CDK environment variables
        run: |
          echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV
          echo "CDK_DEFAULT_REGION=${{ env.AWS_REGION }}" >> $GITHUB_ENV

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Bootstrap CDK (if needed)
        run: |
          if aws ssm get-parameter --name "/cdk-bootstrap/hnb659fds/version" --region $CDK_DEFAULT_REGION >/dev/null 2>&1; then
            echo "CDK already bootstrapped"
          else
            cdk bootstrap aws://$CDK_DEFAULT_ACCOUNT/$CDK_DEFAULT_REGION
          fi

      - name: Create frontend backup
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          CURRENT_BUCKET=$(aws ssm get-parameter --name /acr/production/rental/static-bucket --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-production --query 'Stacks[0].Outputs[?OutputKey==`StaticAssetsBucketName`].OutputValue' --output text 2>/dev/null || echo "")
          if [ -n "$CURRENT_BUCKET" ]; then
            aws s3 sync s3://$CURRENT_BUCKET/ s3://$CURRENT_BUCKET-backup-$TIMESTAMP/ || echo "No previous deployment to backup"
            echo "backup_suffix=backup-$TIMESTAMP" >> $GITHUB_ENV
          fi

      # ── Tunnel CDK deploy ──
      - name: Install tunnel CDK dependencies
        run: pip install aws-cdk-lib constructs
        working-directory: camera-system/infra

      - name: Deploy tunnel infrastructure
        working-directory: camera-system/infra
        run: cdk deploy --all --context environment=production --require-approval never

      # ── Rental CDK deploy ──
      - name: Cache rental build output
        uses: actions/cache@v4
        id: build-cache
        with:
          path: rental-app/dist/
          key: build-${{ hashFiles('rental-app/src/**/*', 'rental-app/package.json', 'rental-app/package-lock.json', 'rental-app/vite.config.ts', 'rental-app/tsconfig.json') }}

      - name: Build rental app (if cache miss)
        if: steps.build-cache.outputs.cache-hit != 'true'
        working-directory: rental-app
        run: |
          npm ci
          npm run build

      - name: Prepare rental Lambda dependencies
        working-directory: rental-app
        run: |
          cd infrastructure/lambda-layers/common/nodejs
          npm ci --production
          cd ../../../../
          mkdir -p infrastructure/lambda/api

      - name: Install rental CDK dependencies
        working-directory: rental-app
        run: npm ci

      - name: Clean up stuck rental stacks
        working-directory: rental-app
        run: |
          STACK_NAME="EzCarRental-production"
          STACK_STATUS=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [[ "$STACK_STATUS" == "ROLLBACK_COMPLETE" || "$STACK_STATUS" == "CREATE_FAILED" || "$STACK_STATUS" == "UPDATE_ROLLBACK_COMPLETE" ]]; then
            aws cloudformation delete-stack --stack-name $STACK_NAME
            aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME || true
          fi

      - name: Deploy rental infrastructure
        working-directory: rental-app/infrastructure
        run: cdk deploy --context environment=production --require-approval never

      - name: Read outputs from SSM
        id: ssm
        run: |
          STATIC_BUCKET=$(aws ssm get-parameter --name /acr/production/rental/static-bucket --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-production --query 'Stacks[0].Outputs[?OutputKey==`StaticAssetsBucketName`].OutputValue' --output text)
          API_ENDPOINT=$(aws ssm get-parameter --name /acr/production/rental/api-endpoint --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-production --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' --output text)
          echo "static_bucket=$STATIC_BUCKET" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        working-directory: rental-app
        run: aws s3 sync dist/ s3://${{ steps.ssm.outputs.static_bucket }}/ --delete

      - name: Production health check
        run: |
          curl -sf ${{ steps.ssm.outputs.api_endpoint }} || exit 1
          curl -sf ${{ steps.ssm.outputs.api_endpoint }}/cars || exit 1

  # ──────────────────────────────────────────
  # Rollback (on production failure)
  # ──────────────────────────────────────────

  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [deploy-production]
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find latest backup
        id: backup
        run: |
          STATIC_BUCKET=$(aws ssm get-parameter --name /acr/production/rental/static-bucket --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-production --query 'Stacks[0].Outputs[?OutputKey==`StaticAssetsBucketName`].OutputValue' --output text)
          LATEST_BACKUP=$(aws s3api list-objects-v2 --bucket $STATIC_BUCKET --prefix "backup-" --query 'sort_by(Contents, &LastModified)[-1].Key' --output text 2>/dev/null || echo "")
          if [ -n "$LATEST_BACKUP" ]; then
            BACKUP_BUCKET="${STATIC_BUCKET}-$(echo $LATEST_BACKUP | cut -d'-' -f2,3)"
            echo "backup_bucket=$BACKUP_BUCKET" >> $GITHUB_OUTPUT
            echo "static_bucket=$STATIC_BUCKET" >> $GITHUB_OUTPUT
          else
            echo "No backup found"
            exit 1
          fi

      - name: Rollback deployment
        run: aws s3 sync s3://${{ steps.backup.outputs.backup_bucket }}/ s3://${{ steps.backup.outputs.static_bucket }}/ --delete

      - name: Verify rollback
        run: |
          API_ENDPOINT=$(aws ssm get-parameter --name /acr/production/rental/api-endpoint --query Parameter.Value --output text 2>/dev/null || \
            aws cloudformation describe-stacks --stack-name EzCarRental-production --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' --output text)
          curl -sf $API_ENDPOINT || echo "API still failing after rollback"
