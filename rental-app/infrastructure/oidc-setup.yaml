AWSTemplateFormatVersion: '2010-09-09'
Description: 'OIDC Identity Provider and IAM Role for GitHub Actions - EZ Car Rental'

Parameters:
  GitHubOrg:
    Type: String
    Default: 'Excersys'
    Description: GitHub organization or username
  
  GitHubRepo:
    Type: String
    Default: 'ezcarrental'
    Description: GitHub repository name
  
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: [dev, staging, production]
    Description: Environment name

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCIdentityProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Project
          Value: EZCarRental
        - Key: Environment
          Value: !Ref Environment

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'EZCarRental-GitHubActions-${Environment}'
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: GitHubActionsDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRoleTags
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub 'arn:aws:secretsmanager:*:${AWS::AccountId}:secret:ezcarrental/*'
      Tags:
        - Key: Project
          Value: EZCarRental
        - Key: Environment
          Value: !Ref Environment

Outputs:
  GitHubActionsRoleArn:
    Description: ARN of the GitHub Actions IAM Role
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub 'EZCarRental-GitHubActionsRole-${Environment}'
  
  OIDCProviderArn:
    Description: ARN of the OIDC Identity Provider
    Value: !Ref GitHubOIDCProvider
    Export:
      Name: !Sub 'EZCarRental-OIDCProvider-${Environment}'